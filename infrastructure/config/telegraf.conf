[agent]
  interval = "10s"
  flush_interval = "10s"

# --- INPUT: MQTT ---
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["home/sensors/+/climate"]
  qos = 0
  data_format = "json"

  # "room" from JSON payload stored as a tag (dimension), not a field
  tag_keys = ["room"]

# --- OUTPUT: InfluxDB v2 ---
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket = "${INFLUX_BUCKET}"
